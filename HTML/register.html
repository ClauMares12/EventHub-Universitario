<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Registro | EventHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body data-page="register">
  <main class="container">
    <section class="auth-panel panel">
      <div class="text-center mb-3">
        <span class="brand-mark mb-2">E</span>
        <h1 class="h4">Crear cuenta</h1>
        <p class="muted mb-0">Registra tu cuenta para comenzar a usar EventHub.</p>
      </div>
      <div id="alertArea"></div>
      <form id="registerForm">
        <div class="mb-3">
          <label class="form-label" for="registerName">Nombre</label>
          <input class="form-control" id="registerName" required minlength="3">
        </div>
        <div class="mb-3">
          <label class="form-label" for="registerEmail">Correo</label>
          <input class="form-control" id="registerEmail" type="email" required>
        </div>
        <div class="mb-3">
          <label class="form-label" for="registerPassword">Contraseña</label>
          <input class="form-control" id="registerPassword" type="password" minlength="6" required>
        </div>
        <button class="btn btn-primary w-100" id="registerBtn">Registrar</button>
      </form>
      <p class="text-center mt-3 mb-0">¿Ya tienes cuenta? <a href="login.html">Inicia sesion</a></p>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="assets/js/main.js"></script>
</body>

</html>
