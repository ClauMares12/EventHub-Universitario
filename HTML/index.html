<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EventHub Universitario</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-page="public">
  <nav class="navbar navbar-expand-lg bg-white">
    <div class="container">
      <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="index.html"><span class="brand-mark">E</span> EventHub</a>
      <div class="d-flex gap-2">
        <a class="btn btn-outline-primary" href="login.html">Iniciar sesion</a>
        <a class="btn btn-primary" href="register.html">Registro</a>
      </div>
    </div>
  </nav>

  <header class="hero-band">
    <div class="container">
      <div class="col-lg-8">
        <h1>EventHub Universitario</h1>
        <p class="fs-5 mb-4">Eventos academicos, culturales y deportivos organizados en un solo lugar para la comunidad universitaria.</p>
        <a class="btn btn-light btn-lg" href="#eventos">Ver eventos disponibles</a>
      </div>
    </div>
  </header>

  <main class="container py-4" id="eventos">
    <div id="alertArea"></div>
    <div class="d-flex flex-column flex-md-row gap-2 justify-content-between align-items-md-center mb-3">
      <div>
        <h2 class="h4 mb-1">Eventos publicados</h2>
        <p class="muted mb-0">Filtra por categoria o fecha y registra tu asistencia.</p>
      </div>
      <div class="d-flex gap-2">
        <select class="form-select" id="filterCategory"></select>
        <input class="form-control" type="date" id="filterDate">
      </div>
    </div>
    <div class="row g-3" id="publicEvents"></div>
  </main>

  <div class="modal fade" id="registrationModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <form class="modal-content" id="registrationForm">
        <div class="modal-header">
          <h3 class="modal-title h5">Registro al evento</h3>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="registrationEventId">
          <div class="mb-3">
            <label class="form-label required" for="studentName">Nombre completo</label>
            <input class="form-control" id="studentName" required minlength="3">
          </div>
          <div class="mb-3">
            <label class="form-label required" for="studentEmail">Correo institucional</label>
            <input class="form-control" id="studentEmail" type="email" required>
          </div>
          <div class="mb-3">
            <label class="form-label required" for="studentId">Matricula</label>
            <input class="form-control" id="studentId" required minlength="4">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button class="btn btn-primary" id="saveRegistrationBtn">Confirmar registro</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="assets/js/main.js"></script>
</body>
</html>
