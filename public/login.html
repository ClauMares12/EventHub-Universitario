<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | EventHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-page="login">
  <main class="container">
    <section class="auth-panel panel">
      <div class="text-center mb-3">
        <span class="brand-mark mb-2">E</span>
        <h1 class="h4">Iniciar sesion</h1>
        <p class="muted mb-0">Accede al dashboard privado de EventHub.</p>
      </div>
      <div id="alertArea"></div>
      <form id="loginForm">
        <div class="mb-3">
          <label class="form-label required" for="loginEmail">Correo</label>
          <input class="form-control" id="loginEmail" type="email" required>
        </div>
        <div class="mb-3">
          <label class="form-label required" for="loginPassword">Contraseña</label>
          <input class="form-control" id="loginPassword" type="password" minlength="6" required>
        </div>
        <button class="btn btn-primary w-100" id="loginBtn">Entrar</button>
      </form>
      <p class="text-center mt-3 mb-0">¿No tienes cuenta? <a href="register.html">Registrate</a></p>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="assets/js/main.js"></script>
</body>
</html>
