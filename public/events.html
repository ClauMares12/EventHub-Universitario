<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Eventos | EventHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-page="events">
  <nav class="navbar navbar-expand-lg bg-white"><div class="container-fluid"><a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="dashboard.html"><span class="brand-mark">E</span> EventHub</a><button class="btn btn-outline-danger" id="logoutBtn">Salir</button></div></nav>
  <div class="container-fluid layout-shell"><div class="row">
    <aside class="col-md-3 col-lg-2 sidebar"><nav class="nav flex-md-column"><a class="nav-link" href="dashboard.html">Dashboard</a><a class="nav-link active" href="events.html">Eventos</a><a class="nav-link" href="categories.html">Categorias</a><a class="nav-link" href="registrations.html">Asistentes</a><a class="nav-link" href="index.html">Vista publica</a></nav></aside>
    <main class="col-md-9 col-lg-10 page-area">
      <div id="alertArea"></div>
      <section class="panel mb-3">
        <div class="d-flex flex-column flex-lg-row justify-content-between gap-2 mb-3">
          <div><h1 class="h4 mb-1">Eventos</h1><p class="muted mb-0">Administra eventos, cupos y estados.</p></div>
          <div class="d-flex gap-2"><input class="form-control" id="eventSearch" placeholder="Buscar evento"><select class="form-select" id="eventStatusFilter"><option value="">Todos</option><option value="draft">Borrador</option><option value="published">Publicado</option><option value="cancelled">Cancelado</option><option value="finished">Finalizado</option></select></div>
        </div>
        <div class="table-responsive"><table class="table table-hover"><thead><tr><th>Titulo</th><th>Categoria</th><th>Fecha</th><th>Cupo</th><th>Estado</th><th class="text-end">Acciones</th></tr></thead><tbody id="eventsTable"></tbody></table></div>
      </section>
      <section class="panel">
        <h2 class="h5" id="eventFormTitle">Nuevo evento</h2>
        <form id="eventForm" class="row g-3">
          <input type="hidden" id="eventId">
          <div class="col-md-6"><label class="form-label required" for="eventTitle">Titulo</label><input class="form-control" id="eventTitle" required minlength="4"></div>
          <div class="col-md-6"><label class="form-label required" for="eventCategory">Categoria</label><select class="form-select" id="eventCategory" required></select></div>
          <div class="col-12"><label class="form-label required" for="eventDescription">Descripcion</label><textarea class="form-control" id="eventDescription" rows="3" required minlength="10"></textarea></div>
          <div class="col-md-4"><label class="form-label required" for="eventLocation">Lugar</label><input class="form-control" id="eventLocation" required minlength="3"></div>
          <div class="col-md-4"><label class="form-label required" for="eventDate">Fecha</label><input class="form-control" id="eventDate" type="date" required></div>
          <div class="col-md-2"><label class="form-label required" for="eventStart">Inicio</label><input class="form-control" id="eventStart" type="time" required></div>
          <div class="col-md-2"><label class="form-label required" for="eventEnd">Fin</label><input class="form-control" id="eventEnd" type="time" required></div>
          <div class="col-md-4"><label class="form-label required" for="eventCapacity">Cupo</label><input class="form-control" id="eventCapacity" type="number" min="1" required></div>
          <div class="col-md-4"><label class="form-label required" for="eventStatus">Estado</label><select class="form-select" id="eventStatus"><option value="draft">Borrador</option><option value="published">Publicado</option><option value="cancelled">Cancelado</option><option value="finished">Finalizado</option></select></div>
          <div class="col-12"><button class="btn btn-primary" id="saveEventBtn">Guardar evento</button><button class="btn btn-outline-secondary" type="button" id="cancelEventEdit">Cancelar</button></div>
        </form>
      </section>
    </main>
  </div></div>
  <div class="modal fade" id="eventDetailModal" tabindex="-1" aria-hidden="true"><div class="modal-dialog modal-lg"><div class="modal-content"><div class="modal-header"><h3 class="modal-title h5">Detalle del evento</h3><button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button></div><div class="modal-body" id="eventDetailBody"></div></div></div></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="assets/js/main.js"></script>
</body>
</html>
