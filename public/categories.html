<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Categorias | EventHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body data-page="categories">
  <nav class="navbar navbar-expand-lg bg-white">
    <div class="container-fluid"><a class="navbar-brand fw-bold d-flex align-items-center gap-2"
        href="dashboard.html"><span class="brand-mark">E</span> EventHub</a><button class="btn btn-outline-danger"
        id="logoutBtn">Salir</button></div>
  </nav>
  <div class="container-fluid layout-shell">
    <div class="row">
      <aside class="col-md-3 col-lg-2 sidebar">
        <nav class="nav flex-md-column"><a class="nav-link" href="dashboard.html">Dashboard</a><a class="nav-link"
            href="events.html">Eventos</a><a class="nav-link active" href="categories.html">Categorias</a><a
            class="nav-link" href="registrations.html">Asistentes</a><a class="nav-link" href="index.html">Vista
            publica</a></nav>
      </aside>
      <main class="col-md-9 col-lg-10 page-area">
        <div id="alertArea"></div>
        <div class="d-flex flex-column flex-lg-row gap-3">
          <section class="panel flex-fill">
            <h1 class="h4">Categorias de eventos</h1>
            <div class="input-group mb-3"><input class="form-control" id="categorySearch"
                placeholder="Buscar categoria"><button class="btn btn-outline-secondary" id="clearCategorySearch"
                type="button">Limpiar</button></div>
            <div class="table-responsive">
              <table class="table table-hover">
                <thead>
                  <tr>
                    <th>Nombre</th>
                    <th>Descripcion</th>
                    <th>Activo</th>
                    <th class="text-end">Acciones</th>
                  </tr>
                </thead>
                <tbody id="categoriesTable"></tbody>
              </table>
            </div>
          </section>
          <section class="panel" style="max-width: 420px;">
            <h2 class="h5" id="categoryFormTitle">Nueva categoria</h2>
            <form id="categoryForm">
              <input type="hidden" id="categoryId">
              <div class="mb-3"><label class="form-label required" for="categoryName">Nombre</label><input
                  class="form-control" id="categoryName" required minlength="3"></div>
              <div class="mb-3"><label class="form-label required"
                  for="categoryDescription">Descripcion</label><textarea class="form-control" id="categoryDescription"
                  rows="4" required minlength="5"></textarea></div>
              <div class="form-check form-switch mb-3"><input class="form-check-input" type="checkbox" role="switch"
                  id="categoryActive" checked><label class="form-check-label" for="categoryActive">Activa</label></div>
              <button class="btn btn-primary" id="saveCategoryBtn">Guardar</button>
              <button class="btn btn-outline-secondary" type="button" id="cancelCategoryEdit">Cancelar</button>
            </form>
          </section>
        </div>
      </main>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="assets/js/main.js"></script>
</body>

</html>
